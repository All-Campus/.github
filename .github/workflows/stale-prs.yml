name: 'Close stale PRs'

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: 'Days of inactivity before a PR is labeled stale'
        type: number
        default: 14
      days-before-close:
        description: 'Days of inactivity after stale label before PR is closed'
        type: number
        default: 7
      exempt-pr-labels:
        description: 'Comma-separated labels that exempt a PR from being marked stale'
        type: string
        default: 'do-not-close,wip'
      exempt-draft-pr:
        description: 'Whether draft PRs are exempt from being marked stale'
        type: boolean
        default: true

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has had no activity for ${{ inputs.days-before-stale }} days
            and has been labeled `stale`. It will be closed automatically in
            ${{ inputs.days-before-close }} days if there is no new activity.
            Add the `do-not-close` label to keep it open indefinitely.
          close-pr-message: >
            This PR has been automatically closed due to inactivity.
            Feel free to reopen it if the work is still needed.
          exempt-pr-labels: ${{ inputs.exempt-pr-labels }}
          exempt-draft-pr: ${{ inputs.exempt-draft-pr }}
          days-before-issue-stale: -1
          days-before-issue-close: -1
